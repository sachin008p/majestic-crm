spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/majestic_crm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:5432}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.springframework.security: DEBUG
    com.majestic.crm: DEBUG

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

app:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-at-least-64-characters-long-123456}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3004,http://localhost:3005,http://localhost:5173,http://localhost:5174}